services:
  # ----------------------------
  # MySQL (metadata de RAGFlow)
  # ----------------------------
  - type: pserv
    name: bts-rag-flow-mysql
    runtime: image
    region: frankfurt
    plan: starter
    image:
      url: mysql:8.0.39
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 20
    envVars:
      - key: MYSQL_DATABASE
        value: rag_flow
      - key: MYSQL_USER
        value: rag_flow
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true

  # ----------------------------
  # MinIO (ficheros subidos)
  # ----------------------------
  - type: pserv
    name: bts-rag-flow-minio
    runtime: image
    region: frankfurt
    plan: starter
    image:
      url: quay.io/minio/minio:RELEASE.2025-06-13T11-33-47Z
    dockerCommand: minio server /data --address :10000 --console-address :9001
    disk:
      name: minio-data
      mountPath: /data
      sizeGB: 50
    envVars:
      - key: MINIO_ROOT_USER
        value: rag_flow
      - key: MINIO_ROOT_PASSWORD
        generateValue: true

  # ----------------------------
  # Redis/Valkey (cola/cache)
  # ----------------------------
  - type: pserv
    name: bts-rag-flow-redis
    runtime: image
    region: frankfurt
    plan: starter
    image:
      url: valkey/valkey:8
    dockerCommand: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    disk:
      name: redis-data
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: REDIS_PASSWORD
        generateValue: true

  # ----------------------------
  # SeekDB (motor doc/vector) - recomendado para Render
  # ----------------------------
  - type: pserv
    name: bts-rag-flow-seekdb
    runtime: image
    region: frankfurt
    plan: starter
    image:
      url: oceanbase/seekdb:latest
    disk:
      name: seekdb-data
      mountPath: /var/lib/oceanbase
      sizeGB: 50
    envVars:
      - key: ROOT_PASSWORD
        generateValue: true
      - key: MEMORY_LIMIT
        value: 2G
      - key: REPORTER
        value: bts-rag-flow-seekdb

    # ----------------------------
  # RAGFlow (Web Service público)
  # ----------------------------
    - type: web
    name: bts-rag-flow
    runtime: image
    region: frankfurt
    plan: pro

    image:
      url: infiniflow/ragflow:v0.24.0

    dockerCommand: /bin/sh -lc "python -c \"import socket,time,sys; host='bts-rag-flow-seekdb'; port=2881; deadline=time.time()+900; \
while True: \
  try: \
    s=socket.create_connection((host,port),timeout=2); s.close(); print('SeekDB is reachable'); break; \
  except Exception as e: \
    print('Waiting for SeekDB...', e); \
    time.sleep(5); \
    if time.time()>deadline: print('Timeout waiting for SeekDB:', e); sys.exit(1)\" && exec ./entrypoint.sh --init-superuser"

    healthCheckPath: /

    envVars:
      - key: TZ
        value: Europe/Madrid

      - key: MINIO_PORT
        value: "10000"

      - key: REGISTER_ENABLED
        value: "0"

      - key: DEFAULT_SUPERUSER_EMAIL
        value: iokin.pardo@bts.com
      - key: DEFAULT_SUPERUSER_NICKNAME
        value: BTS RAG Flow
      - key: DEFAULT_SUPERUSER_PASSWORD
        generateValue: true

      - key: DOC_ENGINE
        value: seekdb

      - key: MYSQL_HOST
        fromService:
          type: pserv
          name: bts-rag-flow-mysql
          property: host
      - key: MYSQL_PORT
        value: "3306"
      - key: MYSQL_DBNAME
        value: rag_flow
      - key: MYSQL_USER
        value: rag_flow
      - key: MYSQL_PASSWORD
        fromService:
          type: pserv
          name: bts-rag-flow-mysql
          envVarKey: MYSQL_PASSWORD

      - key: MINIO_HOST
        value: bts-rag-flow-minio:10000
      - key: MINIO_USER
        fromService:
          type: pserv
          name: bts-rag-flow-minio
          envVarKey: MINIO_ROOT_USER
      - key: MINIO_PASSWORD
        fromService:
          type: pserv
          name: bts-rag-flow-minio
          envVarKey: MINIO_ROOT_PASSWORD

      - key: REDIS_HOST
        fromService:
          type: pserv
          name: bts-rag-flow-redis
          property: host
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        fromService:
          type: pserv
          name: bts-rag-flow-redis
          envVarKey: REDIS_PASSWORD

      - key: SEEKDB_HOST
        fromService:
          type: pserv
          name: bts-rag-flow-seekdb
          property: host
      - key: SEEKDB_PORT
        value: "2881"
      - key: SEEKDB_USER
        value: root
      - key: SEEKDB_PASSWORD
        fromService:
          type: pserv
          name: bts-rag-flow-seekdb
          envVarKey: ROOT_PASSWORD
      - key: SEEKDB_DOC_DBNAME
        value: ragflow_doc
